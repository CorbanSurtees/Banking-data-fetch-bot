name: On Banks Data Merged

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  on-merge:
    if: |
      github.event.pull_request.merged == true &&
      github.event.pull_request.title == 'chore: update banks data'
    
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create PR to release/2.2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git fetch origin
          git checkout release/2.2
          git pull origin release/2.2
          
          BRANCH_NAME="chore/sync-banks-data-to-2.2-${{ github.run_number }}"
          git checkout -b $BRANCH_NAME
          git checkout origin/main -- 3/sql/
          
          if [[ -n $(git status --porcelain) ]]; then
            git add 3/sql/
            git commit -m "chore: sync banks data from main"
            git push origin $BRANCH_NAME
            
            gh pr create \
              --base release/2.2 \
              --head $BRANCH_NAME \
              --title "chore: sync banks data from main" \
              --body "Syncs banks data from PR #${{ github.event.pull_request.number }}" \
              --reviewer ${{ vars.UPDATE_BANK_REVIEWER }}
            
            gh pr merge $BRANCH_NAME --auto --squash || true
          fi
