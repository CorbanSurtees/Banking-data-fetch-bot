name: On Banks Data Merged

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  on-merge:
    if: |
      github.event.pull_request.merged == true &&
      github.event.pull_request.title == 'chore: update banks data'
    
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Create PR to release/2.2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git fetch origin
          git checkout release/2.2
          git pull origin release/2.2
          
          BRANCH_NAME="chore/sync-banks-data-to-2.2-${{ github.run_number }}"
          git checkout -b $BRANCH_NAME
          
          MERGE_COMMIT="${{ github.event.pull_request.merge_commit_sha }}"
          
          # Get the list of files changed in the specific PR commit
          # Use the merge commit's first parent (main before merge) to get only PR changes
          CHANGED_FILES=$(git diff --name-only ${MERGE_COMMIT}^1 ${MERGE_COMMIT} -- 3/sql/)
          
          if [[ -z "$CHANGED_FILES" ]]; then
            echo "No files in 3/sql/ were changed in this PR"
            exit 0
          fi
          
          echo "Files changed in PR: $CHANGED_FILES"
          
          # Checkout only the specific files that were changed in the PR
          for file in $CHANGED_FILES; do
            git checkout $MERGE_COMMIT -- "$file"
          done
          
          if [[ -n $(git status --porcelain) ]]; then
            git add 3/sql/
            git commit -m "chore: sync banks data from main

Cherry-picked changes from commit $MERGE_COMMIT (PR #${{ github.event.pull_request.number }})"
            
            git push origin $BRANCH_NAME
            
            gh pr create \
              --base release/2.2 \
              --head $BRANCH_NAME \
              --title "chore: sync banks data from main" \
              --body "Syncs banks data changes from commit $MERGE_COMMIT (PR #${{ github.event.pull_request.number }})" \
              --reviewer ${{ vars.UPDATE_BANK_REVIEWER }}
            
            gh pr merge $BRANCH_NAME --auto --squash || true
          else
            echo "No changes to sync"
          fi
